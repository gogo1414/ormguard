name: 📝 Documentation
description: Report a gap, error, or confusing part of the README / docs.
labels: ["documentation"]
body:
  - type: textarea
    id: where
    attributes:
      label: Where
      description: Which page or section? A link or file path (e.g. `README.md`, `docs/USAGE.md`) helps.
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What's wrong or missing?
      description: What did you expect to find, or what was unclear / incorrect?
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested fix
      description: Optional — a wording, example, or section you'd add.
